<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binter Canarias - Gestión de Rutas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800;1,900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --binter-green: #40af35;
            --binter-green-dark: #2d8225;
            --binter-bg-green: #41af35;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #cfd8dc;
            --danger-color: #e53935;
            --warning-color: #f57c00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--binter-bg-green);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* BARRA DE NAVEGACIÓN */
        nav {
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-logo {
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .brand-logo .binter-text {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 34px;
            color: #ffffff;
            letter-spacing: -1px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
        }

        .brand-logo .binter-sub {
            font-family: 'Open Sans', sans-serif;
            font-style: italic;
            font-size: 11px;
            color: #ffffff;
            margin-top: -2px;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 13px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #ffffff;
            color: var(--binter-green-dark);
        }

        /* VISTAS / PESTAÑAS */
        .view {
            display: none;
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            padding: 30px 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PORTADA PRINCIPAL */
        #view-home {
            text-align: center;
            color: white;
            padding-top: 40px;
        }

        .hero-logo {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 80px;
            color: #ffffff;
            line-height: 0.9;
            margin-bottom: 5px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
        }

        .hero-sub {
            font-style: italic;
            font-size: 20px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .modo-canario-badge {
            background: #ffffff;
            color: var(--binter-green-dark);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .toggle-icon {
            width: 42px;
            height: 24px;
            background-color: var(--binter-green);
            border-radius: 12px;
            position: relative;
            display: inline-block;
        }

        .toggle-icon::after {
            content: '🌴';
            font-size: 14px;
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-hero {
            background-color: #ffffff
