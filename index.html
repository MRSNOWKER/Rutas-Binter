<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binter Canarias - Gestión de Rutas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800;1,900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --binter-green: #40af35;
            --binter-green-dark: #2d8225;
            --binter-bg-green: #41af35;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #cfd8dc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--binter-bg-green);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- BARRA DE NAVEGACIÓN --- */
        nav {
            background-color: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Logotipo estilo Binter */
        .brand-logo {
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .brand-logo .binter-text {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 34px;
            color: #ffffff;
            letter-spacing: -1px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
        }

        .brand-logo .binter-sub {
            font-family: 'Open Sans', sans-serif;
            font-style: italic;
            font-size: 11px;
            color: #ffffff;
            margin-top: -2px;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 14px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #ffffff;
            color: var(--binter-green-dark);
        }

        /* --- VISTAS / PESTAÑAS --- */
        .view {
            display: none;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PORTADA PRINCIPAL --- */
        #view-home {
            text-align: center;
            color: white;
            padding-top: 40px;
        }

        .hero-logo {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 80px;
            color: #ffffff;
            line-height: 0.9;
            margin-bottom: 5px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
        }

        .hero-sub {
            font-style: italic;
            font-size: 20px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .modo-canario-badge {
            background: #ffffff;
            color: var(--binter-green-dark);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .toggle-icon {
            width: 42px;
            height: 24px;
            background-color: var(--binter-green);
            border-radius: 12px;
            position: relative;
            display: inline-block;
        }

        .toggle-icon::after {
            content: '🌴';
            font-size: 14px;
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-hero {
            background-color: #ffffff;
            color: var(--binter-green-dark);
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-hero:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- FORMULARIO SUBIR TU RUTA --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            color: var(--binter-green-dark);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--binter-green);
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: #455a64;
        }

        input[type="text"] {
            padding: 12px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--binter-green);
        }

        /* Upload Area */
        .file-upload-zone {
            border: 2px dashed var(--binter-green);
            background-color: #f1f8f3;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }

        .file-upload-zone:hover {
            background-color: #e2f2e5;
        }

        .file-upload-zone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            margin-top: 10px;
            font-weight: 600;
            color: var(--binter-green-dark);
        }

        .btn-submit {
            background-color: var(--binter-green);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--binter-green-dark);
        }

        /* --- PESTAÑA RUTAS GUARDADAS --- */
        .routes-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .route-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            align-items: center;
            border-left: 6px solid var(--binter-green);
        }

        .route-item-title {
            font-size: 12px;
            color: #78909c;
            text-transform: uppercase;
            font-weight: 700;
        }

        .route-item-value {
            font-size: 16px;
            font-weight: 700;
            color: #263238;
            margin-top: 3px;
        }

        .btn-download {
            background-color: var(--binter-green);
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
            text-align: center;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-download:hover {
            background-color: var(--binter-green-dark);
        }

        .empty-routes {
            text-align: center;
            padding: 40px;
            color: #78909c;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <nav>
        <a class="brand-logo" onclick="switchTab('home')">
            <span class="binter-text">Binter</span>
            <span class="binter-sub">Líneas aéreas de Canarias</span>
        </a>
        <div class="nav-links">
            <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">Inicio</button>
            <button class="nav-btn" id="nav-upload" onclick="switchTab('upload')">Subir tu ruta</button>
            <button class="nav-btn" id="nav-routes" onclick="switchTab('routes')">Rutas</button>
        </div>
    </nav>

    <div id="view-home" class="view active">
        <div class="hero-logo">Binter</div>
        <div class="hero-sub">Líneas aéreas de Canarias</div>
        
        <div>
            <div class="modo-canario-badge">
                <span class="toggle-icon"></span>
                <span>Vuela en #ModoCanario</span>
            </div>
        </div>

        <div class="hero-buttons">
            <button class="btn-hero" onclick="switchTab('upload')">Subir tu ruta</button>
            <button class="btn-hero" onclick="switchTab('routes')">Ver todas las rutas</button>
        </div>
    </div>

    <div id="view-upload" class="view">
        <div class="card">
            <h2 class="card-title">Subir Nueva Ruta</h2>
            <form id="routeForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="vuelo">Nº Vuelo</label>
                        <input type="text" id="vuelo" placeholder="Ej: NT 221" required>
                    </div>

                    <div class="form-group">
                        <label for="icao">ICAO (Origen - Destino)</label>
                        <input type="text" id="icao" placeholder="Ej: GCXO - GCLP" required>
                    </div>

                    <div class="form-group">
                        <label for="tiempo">Tiempo de Vuelo</label>
                        <input type="text" id="tiempo" placeholder="Ej: 00h 35m" required>
                    </div>

                    <div class="form-group">
                        <label for="estacionamiento">Estacionamiento</label>
                        <input type="text" id="estacionamiento" placeholder="Ej: Stand 12" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="ruta">Ruta</label>
                        <input type="text" id="ruta" placeholder="Ej: LERAM W110 SIMUR" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Plan de Vuelo</label>
                        <div class="file-upload-zone">
                            <span style="font-size: 30px;">📄</span>
                            <p style="margin-top:5px; color: #555;">Haz clic o arrastra aquí tu Plan de Vuelo</p>
                            <input type="file" id="planVuelo" required>
                            <div class="file-name" id="fileNameDisplay">Ningún archivo seleccionado</div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Guardar Ruta</button>
            </form>
        </div>
    </div>

    <div id="view-routes" class="view">
        <div class="card">
            <h2 class="card-title">Rutas Guardadas</h2>
            <div id="routesContainer" class="routes-list">
                </div>
        </div>
    </div>

    <script>
        // Almacenamiento local de rutas
        let routesData = JSON.parse(localStorage.getItem('binter_routes')) || [];

        // Cambio entre pestañas
        function switchTab(tabName) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(`view-${tabName}`).classList.add('active');
            
            const activeNavBtn = document.getElementById(`nav-${tabName}`);
            if (activeNavBtn) activeNavBtn.classList.add('active');

            if (tabName === 'routes') {
                renderRoutes();
            }
        }

        // Mostrar nombre del archivo seleccionado
        const fileInput = document.getElementById('planVuelo');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        let selectedFileData = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
                
                // Convertir archivo a base64 para poder guardarlo y descargarlo
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedFileData = {
                        name: file.name,
                        content: event.target.result
                    };
                };
                reader.readAsDataURL(file);
            } else {
                fileNameDisplay.textContent = "Ningún archivo seleccionado";
                selectedFileData = null;
            }
        });

        // Guardar Ruta
        document.getElementById('routeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!selectedFileData) {
                alert("Por favor, selecciona un Plan de Vuelo.");
                return;
            }

            const newRoute = {
                id: Date.now(),
                vuelo: document.getElementById('vuelo').value,
                icao: document.getElementById('icao').value,
                tiempo: document.getElementById('tiempo').value,
                estacionamiento: document.getElementById('estacionamiento').value,
                ruta: document.getElementById('ruta').value,
                file: selectedFileData
            };

            routesData.unshift(newRoute);
            localStorage.setItem('binter_routes', JSON.stringify(routesData));

            // Resetear formulario
            this.reset();
            fileNameDisplay.textContent = "Ningún archivo seleccionado";
            selectedFileData = null;

            // Redirigir a la pestaña Rutas
            switchTab('routes');
        });

        // Renderizar las rutas en la pestaña Rutas
        function renderRoutes() {
            const container = document.getElementById('routesContainer');
            
            if (routesData.length === 0) {
                container.innerHTML = `<div class="empty-routes">No hay rutas guardadas por el momento. ¡Añade una en "Subir tu ruta"!</div>`;
                return;
            }

            container.innerHTML = routesData.map(route => `
                <div class="route-card">
                    <div>
                        <div class="route-item-title">Nº Vuelo</div>
                        <div class="route-item-value">${route.vuelo}</div>
                    </div>
                    <div>
                        <div class="route-item-title">ICAO</div>
                        <div class="route-item-value">${route.icao}</div>
                    </div>
                    <div>
                        <div class="route-item-title">Tiempo</div>
                        <div class="route-item-value">${route.tiempo}</div>
                    </div>
                    <div>
                        <div class="route-item-title">Estacionamiento</div>
                        <div class="route-item-value">${route.estacionamiento}</div>
                    </div>
                    <div>
                        <div class="route-item-title">Ruta</div>
                        <div class="route-item-value" style="font-size: 14px;">${route.ruta}</div>
                    </div>
                    <div>
                        <div class="route-item-title">Plan de Vuelo</div>
                        <a href="${route.file.content}" download="${route.file.name}" class="btn-download" style="margin-top: 5px;">
                            Descargar
                        </a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
