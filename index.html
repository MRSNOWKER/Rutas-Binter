<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binter Canarias - Gestión de Rutas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800;1,900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --binter-green: #40af35;
            --binter-green-dark: #2d8225;
            --binter-bg-green: #41af35;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #cfd8dc;
            --danger-color: #e53935;
            --warning-color: #f57c00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--binter-bg-green);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVEGACIÓN PRINCIPAL */
        nav {
            background-color: rgba(0, 0, 0, 0.25);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-logo {
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .brand-logo .binter-text {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 34px;
            color: #ffffff;
            letter-spacing: -1px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
        }

        .brand-logo .binter-sub {
            font-family: 'Open Sans', sans-serif;
            font-style: italic;
            font-size: 11px;
            color: #ffffff;
            margin-top: -2px;
            opacity: 0.95;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #ffffff;
            color: var(--binter-green-dark);
        }

        /* CONTENEDOR DE VISTAS */
        .main-container {
            flex: 1;
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .view {
            display: none;
            width: 100%;
        }

        .view.active {
            display: block;
        }

        /* PORTADA */
        #view-home {
            text-align: center;
            color: white;
            padding-top: 30px;
        }

        .hero-logo {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 75px;
            color: #ffffff;
            line-height: 0.9;
            margin-bottom: 5px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.2);
        }

        .hero-sub {
            font-style: italic;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .modo-canario-badge {
            background: #ffffff;
            color: var(--binter-green-dark);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background-color: var(--binter-green);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            padding: 2px;
        }

        .toggle-circle {
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-circle svg {
            width: 13px;
            height: 13px;
            fill: #ffffff;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-hero {
            background-color: #ffffff;
            color: var(--binter-green-dark);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .btn-hero:hover {
            transform: translateY(-2px);
        }

        /* TARJETAS Y FORMULARIOS */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            color: var(--binter-green-dark);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--binter-green);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: #455a64;
        }

        input[type="text"], input[type="password"] {
            padding: 12px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--binter-green);
        }

        .file-upload-zone {
            border: 2px dashed var(--binter-green);
            background-color: #f1f8f3;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            position: relative;
            cursor: pointer;
        }

        .file-upload-zone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            margin-top: 8px;
            font-weight: 600;
            color: var(--binter-green-dark);
            font-size: 13px;
        }

        .btn-submit {
            background-color: var(--binter-green);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
        }

        .btn-submit:hover {
            background-color: var(--binter-green-dark);
        }

        /* LISTA DE RUTAS */
        .routes-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .route-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            align-items: center;
            border-left: 6px solid var(--binter-green);
        }

        .route-item-title {
            font-size: 11px;
            color: #78909c;
            text-transform: uppercase;
            font-weight: 700;
        }

        .route-item-value {
            font-size: 15px;
            font-weight: 700;
            color: #263238;
            margin-top: 3px;
        }

        .btn-download {
            background-color: var(--binter-green);
            color: white;
            padding: 9px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            display: inline-block;
            text-align: center;
        }

        .btn-edit {
            background-color: var(--warning-color);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
        }

        .btn-delete {
            background-color: var(--danger-color);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .empty-routes {
            text-align: center;
            padding: 40px;
            color: #78909c;
        }

        .admin-login-box {
            text-align: center;
            max-width: 380px;
            margin: 30px auto;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
